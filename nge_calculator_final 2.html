<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор SCORE (эндометриоз)</title>
    <!-- Шрифты (ваши) -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Ваши глобальные стили (можно оставить, они не мешают) -->
    <style>
        :root {
            --bg: #0d0f14;
            --surface: #13161e;
            --surface2: #1a1e29;
            --border: #252a38;
            --text: #e8eaf0;
            --text-dim: #6b7280;
            --text-mid: #9ca3af;
            --green: #22c55e;
            --green-dim: #14532d;
            --green-bg: #0f2a1a;
            --yellow: #eab308;
            --yellow-dim: #713f12;
            --yellow-bg: #2a1f0a;
            --red: #ef4444;
            --red-dim: #7f1d1d;
            --red-bg: #2a0f0f;
            --blue: #60a5fa;
            --blue-dim: #1e3a5f;
            --accent: #7c6af5;
            --accent-light: #a89ef8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Instrument Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
        body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 48px 48px; opacity: 0.3; pointer-events: none; z-index: 0; }
        .container { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 48px 24px 80px; }
        /* Остальные ваши стили можно оставить, но компонент использует inline-стили из объекта S, так что они не понадобятся */
    </style>
    <!-- Подключение React, ReactDOM и Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Данные групп (полностью из вашего исходного кода)
        const GROUPS = {
            ovary: {
                title: "Поражение яичников (Sum_Ovary)",
                num: "02",
                options: [
                    { val: 0, label: "Эндометриомы отсутствуют" },
                    { val: 1, label: "Односторонняя эндометриома < 3 см" },
                    { val: 2, label: "Односторонняя эндометриома 3–5 см" },
                    { val: 3, label: "Односторонняя эндометриома > 5 см" },
                    { val: 4, label: "Двусторонние эндометриомы до 3 см" },
                    { val: 5, label: "Двусторонние эндометриомы, хотя бы одна ≥ 3 см" },
                    { val: 6, label: "Функциональное образование яичника" },
                ],
            },
            tubes: {
                title: "Маточные трубы (Sum_OT)",
                num: "03",
                options: [
                    { val: 0, label: "Трубы не изменены" },
                    { val: 1, label: "Тубоовариальное образование (одностороннее)" },
                    { val: 2, label: "Тубоовариальное образование двустороннее / Гематосальпинкс" },
                    { val: 3, label: "ТОО двустороннее + гематосальпинкс" },
                    { val: 4, label: "Гематосальпинкс двусторонний" },
                ],
            },
            rectosigmoid: {
                title: "Ректосигмоидный отдел (Retrosigmoid)",
                num: "05",
                options: [
                    { val: 0, label: "Очаг отсутствует / не фиксирует кишку" },
                    { val: 1, label: "Очаг фиксирует кишку без инвазии стенки" },
                    { val: 2, label: "Прорастание до мышечного слоя включительно" },
                    { val: 3, label: "Инвазия слизистого / подслизистого слоя" },
                ],
            },
            pelvis: {
                title: "Распространение по стенкам таза (Pelvis)",
                num: "06",
                options: [
                    { val: 0, label: "Распространения нет" },
                    { val: 1, label: "Имеется распространение по стенкам таза" },
                ],
            },
        };

        const PAIN_LABELS = ["Дисменорея", "Диспареуния", "Хроническая тазовая боль", "Дисхезия", "Дизурия"];

        // CSS-строка, которая будет вставлена в <style> внутри компонента
        const css = `
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
            * { box-sizing: border-box; margin: 0; padding: 0; }
            body { background: #0d0f1a; }
            :root {
                --bg: #0d0f1a; --surface: #141622; --card: #1a1d2e;
                --border: #252840; --accent: #6c63ff; --accent2: #a78bfa;
                --text: #e2e4f0; --muted: #6b7090; --green: #34d399;
                --yellow: #fbbf24; --red: #f87171;
            }
        `;

        // Компонент App (полностью из вашего исходного кода, но без export default)
        function App() {
            const [age, setAge] = useState("");
            const [selected, setSelected] = useState({ ovary: null, tubes: null, rectosigmoid: null, pelvis: null });
            const [pain, setPain] = useState([false, false, false, false, false]);
            const [result, setResult] = useState(null);
            const [error, setError] = useState("");

            const togglePain = (i) => {
                const next = [...pain];
                next[i] = !next[i];
                setPain(next);
            };

            const select = (group, val) => {
                setSelected(prev => ({ ...prev, [group]: val }));
                setResult(null);
            };

            const painCount = pain.filter(Boolean).length;

            const calculate = () => {
                const a = parseInt(age, 10);
                if (!a || a < 18 || a > 60) { setError("Укажите корректный возраст (18–60 лет)"); return; }
                if (selected.ovary === null) { setError("Выберите вариант для яичников"); return; }
                if (selected.tubes === null) { setError("Выберите вариант для маточных труб"); return; }
                if (selected.rectosigmoid === null) { setError("Выберите вариант для ректосигмоидного отдела"); return; }
                if (selected.pelvis === null) { setError("Выберите вариант для стенок таза"); return; }
                setError("");

                const score = -24 + 8 * selected.ovary + 39 * selected.tubes + (-1) * a + 15 * painCount + 17 * selected.rectosigmoid + 11 * selected.pelvis;
                const zone = score < 0 ? 1 : score <= 15 ? 2 : 3;
                const filters = [];
                if (selected.ovary === 3) filters.push("Односторонняя эндометриома > 5 см");
                if (selected.ovary === 5) filters.push("Двусторонние эндометриомы ≥ 3 см");
                if (selected.rectosigmoid >= 2) filters.push("Инвазия стенки кишки (Retrosigmoid ≥ 2)");

                setResult({ score, zone, filters, age: a, pain: painCount, vals: { ...selected } });
            };

            const reset = () => {
                setAge(""); setSelected({ ovary: null, tubes: null, rectosigmoid: null, pelvis: null });
                setPain([false, false, false, false, false]); setResult(null); setError("");
            };

            const fmt = (v) => (v >= 0 ? "+" : "") + v;

            const zoneData = result ? (result.zone === 1
                ? { label: "ЗОНА I — НИЗКИЙ РИСК", color: "#34d399", bg: "rgba(52,211,153,.1)", border: "rgba(52,211,153,.3)",
                    name: "Консервативная терапия",
                    rec: "Рекомендована гормональная терапия прогестагенами. Динамическое МРТ-наблюдение через 6 месяцев. При нарастании симптоматики или росте очагов — пересмотр тактики." }
                : result.zone === 2
                ? { label: "ЗОНА II — СРЕДНИЙ РИСК", color: "#fbbf24", bg: "rgba(251,191,36,.08)", border: "rgba(251,191,36,.3)",
                    name: "Индивидуальное решение",
                    rec: "Тактика определяется индивидуально. Необходимо учитывать показатели овариального резерва (АМГ, АФЧ), репродуктивные планы пациентки и динамику симптомов. Пробная консервативная терапия 3–6 месяцев с повторной оценкой." }
                : { label: "ЗОНА III — ВЫСОКИЙ РИСК", color: "#f87171", bg: "rgba(248,113,113,.1)", border: "rgba(248,113,113,.3)",
                    name: "Хирургическое лечение",
                    rec: "Консервативная терапия в качестве основного метода нецелесообразна. Рекомендовано хирургическое лечение в плановом порядке. При поражении кишечника — мультидисциплинарная предоперационная подготовка." }
            ) : null;

            // Объект стилей S (полностью из исходного кода)
            const S = {
                wrap: { background: "#0d0f1a", minHeight: "100vh", fontFamily: "'Inter', system-ui, sans-serif", color: "#e2e4f0", paddingBottom: 60 },
                header: { background: "linear-gradient(180deg,#0f1120,#0d0f1a)", borderBottom: "1px solid #252840", padding: "32px 20px 24px", textAlign: "center" },
                badge: { display: "inline-block", background: "rgba(108,99,255,.12)", border: "1px solid rgba(108,99,255,.3)", color: "#a78bfa", fontSize: 11, letterSpacing: ".08em", textTransform: "uppercase", padding: "4px 14px", borderRadius: 20, marginBottom: 16 },
                h1: { fontSize: "clamp(22px,5vw,36px)", fontWeight: 700, color: "#e2e4f0", lineHeight: 1.2 },
                h1span: { color: "#6c63ff" },
                sub: { color: "#6b7090", fontSize: 13, marginTop: 6 },
                formulaBar: { display: "inline-block", marginTop: 16, background: "#141622", border: "1px solid #252840", borderRadius: 8, padding: "9px 18px", fontFamily: "monospace", fontSize: 12, color: "#6b7090" },
                fkey: { color: "#a78bfa", fontWeight: 600 },
                main: { maxWidth: 700, margin: "0 auto", padding: "0 16px" },
                secLabel: { display: "flex", alignItems: "center", gap: 8, margin: "28px 0 10px", fontSize: 11, letterSpacing: ".1em", textTransform: "uppercase", color: "#6b7090" },
                secLine: { flex: 1, height: 1, background: "#252840" },
                secNum: { background: "#1e2235", border: "1px solid #2a3050", color: "#6c63ff", padding: "2px 8px", borderRadius: 4, fontSize: 10, flexShrink: 0 },
                card: { background: "#1a1d2e", border: "1px solid #252840", borderRadius: 12, padding: "20px 18px", marginBottom: 12 },
                cardTitle: { fontSize: 16, fontWeight: 600, color: "#e2e4f0", marginBottom: 16 },
                ageRow: { display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" },
                ageInp: { background: "#141622", border: "1px solid #2a3050", borderRadius: 8, color: "#e2e4f0", fontFamily: "monospace", fontSize: 24, padding: "8px 14px", width: 100, textAlign: "center", outline: "none" },
                ageLbl: { color: "#6b7090", fontSize: 14 },
                optWrap: { display: "flex", flexDirection: "column", gap: 7 },
                opt: (sel) => ({
                    display: "flex", alignItems: "center", gap: 14,
                    padding: "12px 16px",
                    background: sel ? "rgba(108,99,255,.14)" : "#141622",
                    border: `1px solid ${sel ? "#6c63ff" : "#252840"}`,
                    borderRadius: 10, cursor: "pointer",
                    transition: "all .12s", userSelect: "none",
                    WebkitTapHighlightColor: "transparent",
                }),
                optCode: (sel) => ({
                    minWidth: 22, height: 22, borderRadius: 6,
                    background: sel ? "#6c63ff" : "#1e2235",
                    border: `1px solid ${sel ? "#6c63ff" : "#2a3050"}`,
                    color: sel ? "#fff" : "#6c63ff",
                    fontSize: 11, fontWeight: 700, display: "flex",
                    alignItems: "center", justifyContent: "center", flexShrink: 0,
                }),
                optText: (sel) => ({ fontSize: 13, color: sel ? "#e2e4f0" : "#8090b0", flex: 1, lineHeight: 1.4 }),
                optDot: (sel) => ({
                    width: 8, height: 8, borderRadius: "50%",
                    background: sel ? "#6c63ff" : "transparent",
                    border: `1.5px solid ${sel ? "#6c63ff" : "#3a4060"}`,
                    flexShrink: 0, transition: "all .12s",
                }),
                painGrid: { display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(150px,1fr))", gap: 8 },
                painItem: (sel) => ({
                    display: "flex", alignItems: "center", gap: 9,
                    background: sel ? "rgba(108,99,255,.12)" : "#141622",
                    border: `1px solid ${sel ? "#6c63ff" : "#252840"}`,
                    borderRadius: 9, padding: "11px 13px", cursor: "pointer",
                    userSelect: "none", WebkitTapHighlightColor: "transparent",
                    transition: "all .12s",
                }),
                painBox: (sel) => ({
                    width: 20, height: 20, borderRadius: 5,
                    border: `2px solid ${sel ? "#6c63ff" : "#2a3050"}`,
                    background: sel ? "#6c63ff" : "transparent",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 12, fontWeight: 700, color: "#fff", flexShrink: 0,
                }),
                painTxt: (sel) => ({ fontSize: 13, color: sel ? "#e2e4f0" : "#6b7090" }),
                painCounter: { marginTop: 10, fontSize: 13, color: "#6b7090", fontFamily: "monospace" },
                calcBtn: { width: "100%", padding: "16px", background: "linear-gradient(135deg,#6c63ff,#8b5cf6)", border: "none", borderRadius: 12, color: "#fff", fontSize: 16, fontWeight: 700, cursor: "pointer", marginTop: 8, letterSpacing: ".02em", WebkitTapHighlightColor: "transparent" },
                errBox: { background: "rgba(248,113,113,.1)", border: "1px solid rgba(248,113,113,.3)", borderRadius: 8, padding: "10px 14px", fontSize: 13, color: "#f87171", marginTop: 10 },
                resultWrap: (zd) => ({ background: zd.bg, border: `1px solid ${zd.border}`, borderRadius: 14, padding: "24px 20px", marginTop: 24 }),
                resZoneLabel: (zd) => ({ fontSize: 13, fontWeight: 700, color: zd.color, letterSpacing: ".08em", textTransform: "uppercase", marginBottom: 10 }),
                resScore: (zd) => ({ fontFamily: "monospace", fontSize: 64, fontWeight: 800, color: zd.color, lineHeight: 1 }),
                resScoreLbl: { fontSize: 12, color: "#6b7090", letterSpacing: ".1em", textTransform: "uppercase", marginTop: 2 },
                resDivider: { height: 1, background: "rgba(255,255,255,.07)", margin: "18px 0" },
                resZoneName: { fontSize: 20, fontWeight: 700, color: "#e2e4f0", marginBottom: 10 },
                resRec: { fontSize: 13, color: "#9099b8", lineHeight: 1.65 },
                summaryGrid: { display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8, marginTop: 18 },
                summaryItem: { background: "rgba(0,0,0,.2)", borderRadius: 8, padding: "10px 12px" },
                summaryKey: { fontSize: 10, color: "#6b7090", textTransform: "uppercase", letterSpacing: ".06em", display: "block", marginBottom: 3 },
                summaryVal: { fontSize: 15, fontWeight: 700, color: "#e2e4f0", fontFamily: "monospace" },
                bdownWrap: { marginTop: 16, background: "rgba(0,0,0,.2)", borderRadius: 10, padding: "14px 16px" },
                bdownTitle: { fontSize: 10, color: "#6b7090", textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 10 },
                brow: { display: "flex", justifyContent: "space-between", padding: "3px 0", fontFamily: "monospace", fontSize: 12, borderBottom: "1px dashed rgba(255,255,255,.05)" },
                bname: { color: "#6b7090" },
                bval: (v) => ({ fontWeight: 600, color: v > 0 ? "#34d399" : v < 0 ? "#f87171" : "#6b7090" }),
                btotRow: { display: "flex", justifyContent: "space-between", marginTop: 8, fontFamily: "monospace", fontSize: 15, fontWeight: 800 },
                filterBox: { marginTop: 14, background: "rgba(248,113,113,.08)", border: "1px solid rgba(248,113,113,.25)", borderRadius: 8, padding: "12px 14px" },
                filterTitle: { fontSize: 12, fontWeight: 700, color: "#f87171", marginBottom: 6 },
                filterItem: { fontSize: 12, color: "#f5a0a0", lineHeight: 1.7 },
                filterNote: { fontSize: 11, color: "#d08080", marginTop: 8, paddingTop: 8, borderTop: "1px solid rgba(248,113,113,.2)", lineHeight: 1.5 },
                resetBtn: { width: "100%", marginTop: 14, background: "transparent", border: "1px solid #252840", color: "#6b7090", fontSize: 14, padding: "11px", borderRadius: 10, cursor: "pointer", WebkitTapHighlightColor: "transparent" },
                footer: { maxWidth: 700, margin: "32px auto 0", padding: "0 16px", fontSize: 12, color: "#4a5070", lineHeight: 1.65, borderTop: "1px solid #1a1d2e", paddingTop: 20 },
            };

            const terms = result ? [
                { label: "Константа", val: -24 },
                { label: `8 × Sum_Ovary (${result.vals.ovary})`, val: 8 * result.vals.ovary },
                { label: `39 × Sum_OT (${result.vals.tubes})`, val: 39 * result.vals.tubes },
                { label: `−1 × Age (${result.age})`, val: -result.age },
                { label: `15 × Боль (${result.pain})`, val: 15 * result.pain },
                { label: `17 × Retrosigmoid (${result.vals.rectosigmoid})`, val: 17 * result.vals.rectosigmoid },
                { label: `11 × Pelvis (${result.vals.pelvis})`, val: 11 * result.vals.pelvis },
            ] : [];

            const summaryItems = result ? [
                { key: "Возраст", val: result.age + " л" },
                { key: "Sum_Ovary", val: result.vals.ovary },
                { key: "Sum_OT", val: result.vals.tubes },
                { key: "Боль", val: result.pain + "/5" },
                { key: "Retrosigmoid", val: result.vals.rectosigmoid },
                { key: "Pelvis", val: result.vals.pelvis },
            ] : [];

            return (
                <div style={S.wrap}>
                    <style>{css}</style>
                    <div style={S.header}>
                        <div style={S.badge}>◈ НМИЦ АГП им. В.И. Кулакова · НГЭ</div>
                        <h1 style={S.h1}>Шкала <span style={S.h1span}>SCORE</span></h1>
                        <p style={S.sub}>Стратификация хирургического риска при наружном генитальном эндометриозе</p>
                        <div style={S.formulaBar}>
                            <span style={S.fkey}>SCORE</span>{" = −24 + 8·OV + 39·OT − 1·Age + 15·Pain + 17·RS + 11·PV"}
                        </div>
                    </div>
                    <div style={S.main}>
                        {/* Возраст */}
                        <div style={S.secLabel}><span style={S.secNum}>01</span>Возраст пациентки<div style={S.secLine}/></div>
                        <div style={S.card}>
                            <div style={S.cardTitle}>Возраст</div>
                            <div style={S.ageRow}>
                                <input style={S.ageInp} type="number" min="18" max="60" placeholder="35"
                                    value={age} onChange={e => setAge(e.target.value)} />
                                <span style={S.ageLbl}>от 18 до 60 лет</span>
                            </div>
                        </div>

                        {/* Группы опций */}
                        {Object.entries(GROUPS).map(([key, grp]) => (
                            <div key={key}>
                                <div style={S.secLabel}><span style={S.secNum}>{grp.num}</span>{grp.title}<div style={S.secLine}/></div>
                                <div style={S.card}>
                                    <div style={S.optWrap}>
                                        {grp.options.map(opt => {
                                            const sel = selected[key] === opt.val;
                                            return (
                                                <div key={opt.val} style={S.opt(sel)} onClick={() => select(key, opt.val)}>
                                                    <div style={S.optCode(sel)}>{opt.val}</div>
                                                    <span style={S.optText(sel)}>{opt.label}</span>
                                                    <div style={S.optDot(sel)} />
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        ))}

                        {/* Боль */}
                        <div style={S.secLabel}><span style={S.secNum}>04</span>Болевой синдром (Pain_quantitative)<div style={S.secLine}/></div>
                        <div style={S.card}>
                            <div style={S.cardTitle}>Отметьте все имеющиеся симптомы</div>
                            <div style={S.painGrid}>
                                {PAIN_LABELS.map((lbl, i) => (
                                    <div key={i} style={S.painItem(pain[i])} onClick={() => togglePain(i)}>
                                        <div style={S.painBox(pain[i])}>{pain[i] ? "✓" : ""}</div>
                                        <span style={S.painTxt(pain[i])}>{lbl}</span>
                                    </div>
                                ))}
                            </div>
                            <div style={S.painCounter}>Выбрано симптомов: {painCount} из 5</div>
                        </div>

                        {/* Ошибка */}
                        {error && <div style={S.errBox}>⚠ {error}</div>}

                        {/* Кнопка расчёта */}
                        {!result && (
                            <button style={S.calcBtn} onClick={calculate}>
                                Рассчитать SCORE →
                            </button>
                        )}

                        {/* Результат */}
                        {result && zoneData && (
                            <div style={S.resultWrap(zoneData)}>
                                <div style={S.resZoneLabel(zoneData)}>{zoneData.label}</div>
                                <div style={S.resScore(zoneData)}>{fmt(result.score)}</div>
                                <div style={S.resScoreLbl}>SCORE</div>
                                <div style={S.resDivider} />
                                <div style={S.resZoneName}>{zoneData.name}</div>
                                <div style={S.resRec}>{zoneData.rec}</div>

                                <div style={S.summaryGrid}>
                                    {summaryItems.map(it => (
                                        <div key={it.key} style={S.summaryItem}>
                                            <span style={S.summaryKey}>{it.key}</span>
                                            <span style={S.summaryVal}>{it.val}</span>
                                        </div>
                                    ))}
                                </div>

                                <div style={S.bdownWrap}>
                                    <div style={S.bdownTitle}>Расчёт формулы</div>
                                    {terms.map((t, i) => (
                                        <div key={i} style={S.brow}>
                                            <span style={S.bname}>{t.label}</span>
                                            <span style={S.bval(t.val)}>{fmt(t.val)}</span>
                                        </div>
                                    ))}
                                    <div style={S.btotRow}>
                                        <span style={{ color: "#6b7090" }}>SCORE</span>
                                        <span style={{ color: zoneData.color }}>{fmt(result.score)}</span>
                                    </div>
                                </div>

                                {result.filters.length > 0 && (
                                    <div style={S.filterBox}>
                                        <div style={S.filterTitle}>⚠ Абсолютные показания к операции</div>
                                        {result.filters.map((f, i) => (
                                            <div key={i} style={S.filterItem}>→ {f}</div>
                                        ))}
                                        <div style={S.filterNote}>
                                            Консультация хирурга и оперативное лечение необходимы вне зависимости от значения SCORE
                                        </div>
                                    </div>
                                )}

                                <button style={S.resetBtn} onClick={reset}>↺ Новый расчёт</button>
                            </div>
                        )}

                        {/* Футер */}
                        <div style={S.footer}>
                            <strong style={{ color: "#6c63ff" }}>Важно:</strong> Калькулятор является вспомогательным инструментом клинической поддержки принятия решений. Окончательное решение о тактике лечения принимается лечащим врачом. Шкала разработана на основании данных когортного исследования (n=139) и валидирована на тестовой выборке (n=41, точность 80,5%).
                        </div>
                    </div>
                </div>
            );
        }

        // Рендеринг приложения
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
